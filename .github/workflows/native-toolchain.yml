name: Native Toolchain Matrix

on:
  pull_request:
    paths:
      - ".github/workflows/native-toolchain.yml"
      - "autoproj/**"
      - "docs/src/package-policy.md"
      - "docs/src/modernization-plan.md"
      - "docs/superpowers/**"
      - "tools/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/native-toolchain.yml"
      - "autoproj/**"
      - "docs/src/package-policy.md"
      - "docs/src/modernization-plan.md"
      - "docs/superpowers/**"
      - "tools/**"
  workflow_dispatch:

jobs:
  build:
    name: Ubuntu ${{ matrix.ubuntu-version }} Native Build
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:${{ matrix.ubuntu-version }}

    strategy:
      fail-fast: false
      matrix:
        ubuntu-version:
          - "22.04"
          - "24.04"

    env:
      DEBIAN_FRONTEND: noninteractive
      OROCOS_ROCK_PREFIX: /opt/orocos
      SHELL: /bin/bash

    defaults:
      run:
        shell: bash

    steps:
      - name: Install CI base dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            git \
            libboost-dev \
            libboost-filesystem-dev \
            libboost-graph-dev \
            libboost-iostreams-dev \
            libboost-program-options-dev \
            libboost-regex-dev \
            libboost-system-dev \
            libboost-thread-dev \
            libffi-dev \
            libncurses5-dev \
            libomniorb4-dev \
            libxml2-dev \
            libxml-xpath-perl \
            lsb-release \
            omniidl \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip \
            ripgrep \
            ruby \
            ruby-dev \
            sudo \
            xz-utils

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Autoproj
        run: ./tools/install-autoproj.sh

      - name: Check repository policy
        run: ruby tools/check-autoproj-policy.rb

      - name: Bootstrap workspace
        run: ./tools/bootstrap.sh --prefix "$OROCOS_ROCK_PREFIX"

      - name: Build and install toolchain
        run: ./tools/install.sh --prefix "$OROCOS_ROCK_PREFIX"

      - name: Validate installed prefix
        run: ./tools/validate-install.sh --prefix "$OROCOS_ROCK_PREFIX"

      - name: Check compiler warning budget
        run: |
          set -euo pipefail
          if rg -n "warning:|deprecated|pragma message" "$OROCOS_ROCK_PREFIX"/toolchain/log/*-build.log; then
            echo "compiler warning budget exceeded" >&2
            exit 1
          fi
