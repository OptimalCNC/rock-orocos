name: Package Tests

on:
  pull_request:
    paths:
      - ".github/workflows/package-tests.yml"
      - "autoproj/**"
      - "tools/**"
  workflow_dispatch:

jobs:
  package-test:
    name: Ubuntu 22.04 ${{ matrix.package-test }}
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:22.04
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        package-test:
          - utilmm
          - log4cpp
          - typelib-cxx
          - rtt-core
          - ocl-basic
          - ocl-integration

    env:
      DEBIAN_FRONTEND: noninteractive
      OROCOS_ROCK_PREFIX: /opt/orocos
      SHELL: /bin/bash

    defaults:
      run:
        shell: bash

    steps:
      - name: Install CI base and test dependencies
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            cmake \
            curl \
            git \
            libboost-dev \
            libboost-filesystem-dev \
            libboost-graph-dev \
            libboost-iostreams-dev \
            libboost-program-options-dev \
            libboost-regex-dev \
            libboost-system-dev \
            libboost-test-dev \
            libboost-thread-dev \
            libcppunit-dev \
            libffi-dev \
            libncurses5-dev \
            libomniorb4-dev \
            libreadline-dev \
            libxml2-dev \
            libxml-xpath-perl \
            lsb-release \
            omniidl \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip \
            ripgrep \
            ruby \
            ruby-dev \
            sudo \
            xz-utils

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Autoproj
        run: ./tools/install-autoproj.sh

      - name: Bootstrap workspace
        run: ./tools/bootstrap.sh --prefix "$OROCOS_ROCK_PREFIX"

      - name: Build and install toolchain
        run: ./tools/install.sh --prefix "$OROCOS_ROCK_PREFIX"

      - name: Run package test subset
        run: ./tools/test-package.sh --prefix "$OROCOS_ROCK_PREFIX" "${{ matrix.package-test }}" 2>&1 | tee "package-test-${{ matrix.package-test }}.log"

      - name: Upload package test logs
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: package-test-logs-ubuntu-22.04-${{ matrix.package-test }}
          if-no-files-found: ignore
          path: |
            package-test-${{ matrix.package-test }}.log
            .autoproj/config.yml
            .autoproj/env.yml
            .autoproj/installation-manifest
            .autoproj/remotes/**/*.autobuild
            .autoproj/remotes/**/*.osdeps
            ${{ env.OROCOS_ROCK_PREFIX }}/toolchain/log/*.log
            ${{ env.OROCOS_ROCK_PREFIX }}/toolchain/log/*-stamp
            toolchain/tools/**/build/CMakeFiles/CMakeOutput.log
            toolchain/tools/**/build/CMakeFiles/CMakeError.log
            toolchain/tools/**/build/Testing/Temporary/*.log
