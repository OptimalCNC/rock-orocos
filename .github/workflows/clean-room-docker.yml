name: Clean Room Docker Build

on:
  pull_request:
    paths:
      - ".github/workflows/clean-room-docker.yml"
      - ".dockerignore"
      - "autoproj/**"
      - "docker/**"
      - "tools/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/clean-room-docker.yml"
      - ".dockerignore"
      - "autoproj/**"
      - "docker/**"
      - "tools/**"
  workflow_dispatch:

jobs:
  build:
    name: Build MetaNC-Based Toolchain Image
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build clean-room image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/orocos-rock/Dockerfile
          pull: true
          push: false
          load: true
          tags: orocos-rock:metanc-latest

      - name: Check development environment
        run: |
          docker run --rm --user ubuntu orocos-rock:metanc-latest bash -lc '
            test "$(whoami)" = "ubuntu"
            test ! -e /opt/orocos-rock
            source /opt/orocos/dev-env.sh
            ! command -v autoproj
            command -v deployer-gnulinux
            command -v orogen
            command -v typegen
          '
