name: Clean Room Docker Build

on:
  workflow_dispatch:

jobs:
  build:
    name: Build Ubuntu ${{ matrix.ubuntu-version }} Toolchain Image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        ubuntu-version:
          - "22.04"
          - "24.04"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: useblacksmith/setup-docker-builder@v1

      - name: Build clean-room image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: docker/orocos-rock/Dockerfile
          build-args: |
            UBUNTU_VERSION=${{ matrix.ubuntu-version }}
          pull: true
          push: false
          load: true
          tags: orocos-rock:ubuntu-${{ matrix.ubuntu-version }}

      - name: Check development environment
        run: |
          docker run --rm --user ubuntu orocos-rock:ubuntu-${{ matrix.ubuntu-version }} bash -lc '
            set -euo pipefail
            test "$(whoami)" = "ubuntu"
            test ! -e /opt/orocos-rock
            source /opt/orocos/dev-env.sh
            ! command -v autoproj
            command -v deployer-gnulinux
            command -v orogen
            command -v typegen
          '
