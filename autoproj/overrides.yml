# Version-control overrides for packages imported from remote package sets.
#
# Keep this file focused on source selection. Package build policy belongs in
# tracked package-set definitions or in autoproj/overrides.rb.
#
overrides:
  - farbot:
    type: git
    url: https://github.com/liufang-robot/farbot.git
    branch: dev

  - rtlog-cpp:
    type: git
    url: https://github.com/liufang-robot/rtlog-cpp.git
    branch: dev

  - rtt:
    type: git
    url: https://github.com/OptimalCNC/rtt.git
    branch: dev

  - ocl:
    type: git
    url: https://github.com/OptimalCNC/ocl.git
    branch: dev

  - log4cpp:
    type: git
    url: https://github.com/OptimalCNC/log4cpp.git
    branch: dev

  - orogen:
    type: git
    url: https://github.com/OptimalCNC/tools-orogen.git
    branch: dev

  - typelib:
    type: git
    url: https://github.com/OptimalCNC/tools-typelib.git
    branch: dev

  - utilmm:
    type: git
    url: https://github.com/OptimalCNC/utilmm.git
    branch: dev

  - rtt_typelib:
    type: git
    url: https://github.com/OptimalCNC/tools-rtt_typelib.git
    branch: dev

  - stdint_typekit:
    type: git
    url: https://github.com/OptimalCNC/stdint_typekit.git
    branch: dev
