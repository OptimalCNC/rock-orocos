# Version-control overrides for packages imported from remote package sets.
#
# Keep this file focused on source selection. Package build policy belongs in
# tracked package-set definitions or in autoproj/overrides.rb.
#
overrides:
  - rtt:
    type: git
    url: https://github.com/liufang-robot/rtt.git
    branch: dev

  - ocl:
    type: git
    url: https://github.com/liufang-robot/ocl.git
    branch: dev

  - log4cpp:
    type: git
    url: https://github.com/liufang-robot/log4cpp.git
    branch: dev

  - orogen:
    type: git
    url: https://github.com/liufang-robot/tools-orogen.git
    branch: dev

  - typelib:
    type: git
    url: https://github.com/liufang-robot/tools-typelib.git
    branch: dev

  - utilmm:
    type: git
    url: https://github.com/liufang-robot/utilmm.git
    branch: dev

  - rtt_typelib:
    type: git
    url: https://github.com/liufang-robot/tools-rtt_typelib.git
    branch: dev

  - stdint_typekit:
    type: git
    url: https://github.com/liufang-robot/stdint_typekit.git
    branch: dev
